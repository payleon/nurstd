<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5"
    />
    <!-- Performance optimization meta tags -->
    <meta http-equiv="x-dns-prefetch-control" content="on">
    <meta name="theme-color" content="#4B9CD3">
    <meta name="color-scheme" content="light dark">
    <title>NURS'TD - NCLEX Study Platform</title>
    <meta
      name="description"
      content="Comprehensive NCLEX preparation platform with adaptive learning, specialized medical question banks, flashcards, case studies, and interactive exam tools. Designed for nursing students."
    />
    <meta
      name="keywords"
      content="NCLEX, nursing exam, RN, test prep, nursing education, medical questions, healthcare, study platform"
    />
    <meta name="author" content="NURS'TD Learning" />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="NURS'TD - NCLEX Study Platform" />
    <meta
      property="og:description"
      content="Comprehensive NCLEX preparation platform with adaptive learning, specialized medical question banks, and interactive exam tools."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nclexxx.me/" />
    <meta property="og:image" content="https://nclexxx.me/og-image.svg" />
    <link rel="canonical" href="https://nclexxx.me/" />
    
    <!-- Favicon and app icons -->
    <link rel="apple-touch-icon" sizes="57x57" href="/favicons/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="/favicons/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="/favicons/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="/favicons/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="/favicons/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/favicons/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/favicons/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/favicons/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicons/android-icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicons/favicon-96x96.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicons/favicon-16x16.png">
    <link rel="manifest" href="/favicons/manifest.json">
    <meta name="msapplication-TileColor" content="#4B9CD3">
    <meta name="msapplication-TileImage" content="/favicons/ms-icon-144x144.png">
    
    <!-- Preload critical assets -->
    <link rel="preload" href="/src/index.css" as="style">
    <link rel="modulepreload" href="/src/main.tsx" as="script">
    
    <!-- Font Loading Strategy: Optimized to eliminate render blocking using the FOUT technique -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Preload only the most critical weights of Space Grotesk -->
    <link 
      rel="preload" 
      href="https://fonts.gstatic.com/s/spacegrotesk/v16/V8mQoQDjQSkFtoMM3T6r8E7mF71Q-gOoraIAEj7oUXsrPMBTTA.woff2" 
      as="font" 
      type="font/woff2" 
      crossorigin="anonymous"
      fetchpriority="high"
    />
    
    <!-- Preconnect to Google Fonts to establish early connection -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
    
    <!-- Load font CSS asynchronously with swap to prevent render blocking -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    
    <!-- Fallback font metrics to prevent CLS (Cumulative Layout Shift) -->
    <style>
      /* Critical styles to avoid layout shifts while fonts are loading */
      @font-face {
        font-family: 'Space Grotesk Fallback';
        size-adjust: 100%;
        ascent-override: 90%;
        descent-override: 25%;
        line-gap-override: 0%;
        src: local('Arial');
        font-display: swap;
      }
      
      @font-face {
        font-family: 'Space Mono Fallback';
        size-adjust: 105%;
        ascent-override: 95%;
        descent-override: 25%;
        line-gap-override: 0%;
        src: local('Courier New');
        font-display: swap;
      }
      
      @font-face {
        font-family: 'Inter Fallback';
        size-adjust: 100%;
        ascent-override: 90%;
        descent-override: 23%;
        line-gap-override: 0%;
        src: local('Helvetica');
        font-display: swap;
      }
      
      /* Apply font stacks with fallbacks */
      body {
        font-family: 'Inter', 'Inter Fallback', system-ui, sans-serif;
      }
      
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Space Grotesk', 'Space Grotesk Fallback', system-ui, sans-serif;
      }
      
      code, pre {
        font-family: 'Space Mono', 'Space Mono Fallback', monospace;
      }
    </style>
    
    <!-- Noscript fallback for browsers with JavaScript disabled -->
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
