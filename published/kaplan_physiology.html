<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kaplan NCLEX - Physiological Integrity</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #fff;
      color: #333;
      max-width: 800px;
      margin: 0 auto;
    }
    .question-container {
      padding: 20px;
      margin-bottom: 20px;
    }
    .topic-header {
      font-weight: bold;
      margin-bottom: 15px;
      font-size: 18px;
      color: #265a88;
    }
    .question-text {
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .options-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .option {
      display: flex;
      align-items: center;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }
    .option:hover {
      background-color: #f5f5f5;
    }
    .radio-btn {
      margin-right: 10px;
    }
  </style>
</head>
<body>
  <div class="question-container">
    <div class="topic-header">Physiological Integrity</div>
    <div class="question-text">
      <p>A patient has a maintenance IV of D5W infusing at 15 drops per minute. The nurse should regulate the flow rate so that the patient receives how many drops of fluid per minute?</p>
    </div>
    
    <div class="options-container">
      <div class="option">
        <input type="radio" id="option1" name="answer" class="radio-btn">
        <label for="option1">21</label>
      </div>
      
      <div class="option">
        <input type="radio" id="option2" name="answer" class="radio-btn">
        <label for="option2">28</label>
      </div>
      
      <div class="option">
        <input type="radio" id="option3" name="answer" class="radio-btn">
        <label for="option3">31</label>
      </div>
      
      <div class="option">
        <input type="radio" id="option4" name="answer" class="radio-btn">
        <label for="option4">42</label>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.option').forEach(option => {
      option.addEventListener('click', function() {
        const radio = this.querySelector('input[type="radio"]');
        radio.checked = true;
      });
    });
  </script>
</body>
</html>
