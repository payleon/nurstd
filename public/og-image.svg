<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#13294B" />
  
  <!-- Gradient overlay -->
  <rect width="1200" height="630" fill="url(#paint0_linear)" />
  
  <!-- Medical cross symbol -->
  <rect x="150" y="215" width="200" height="200" rx="20" fill="#4B9CD3" />
  <rect x="200" y="165" width="100" height="300" rx="20" fill="#4B9CD3" />
  
  <!-- NURS'TD Logo Text -->
  <text x="400" y="280" font-family="Arial, sans-serif" font-size="92" font-weight="bold" fill="white">NURS'TD</text>
  
  <!-- Subtitle -->
  <text x="400" y="340" font-family="Arial, sans-serif" font-size="38" fill="#E0E0E0">NCLEX Study Platform</text>
  
  <!-- Feature list -->
  <text x="400" y="410" font-family="Arial, sans-serif" font-size="24" fill="#4B9CD3">✓ Adaptive Question Bank</text>
  <text x="400" y="450" font-family="Arial, sans-serif" font-size="24" fill="#4B9CD3">✓ Interactive Case Studies</text>
  <text x="400" y="490" font-family="Arial, sans-serif" font-size="24" fill="#4B9CD3">✓ Medical Practice Games</text>
  
  <!-- Pulse line animation -->
  <path d="M 50,530 L 150,530 L 200,450 L 250,580 L 300,490 L 350,530 L 1150,530" 
        stroke="#4B9CD3" stroke-width="5" fill="none" />
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="paint0_linear" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#13294B" />
      <stop offset="1" stop-color="#091528" />
    </linearGradient>
  </defs>
</svg>