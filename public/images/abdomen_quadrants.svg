<svg width="600" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="600" fill="#f0f0f0"/>
  
  <!-- Grid lines -->
  <line x1="300" y1="0" x2="300" y2="600" stroke="#000" stroke-width="2"/>
  <line x1="0" y1="300" x2="600" y2="300" stroke="#000" stroke-width="2"/>
  
  <!-- Labels for quadrants -->
  <text x="150" y="150" text-anchor="middle" font-family="Arial" font-size="24" fill="#333">Right Upper Quadrant</text>
  <text x="450" y="150" text-anchor="middle" font-family="Arial" font-size="24" fill="#333">Left Upper Quadrant</text>
  <text x="150" y="450" text-anchor="middle" font-family="Arial" font-size="24" fill="#333">Right Lower Quadrant</text>
  <text x="450" y="450" text-anchor="middle" font-family="Arial" font-size="24" fill="#333">Left Lower Quadrant</text>
  
  <!-- RUQ area -->
  <rect x="65" y="20" width="25%" height="25%" fill="rgba(0,0,255,0.1)" stroke="#000" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- LUQ area -->
  <rect x="10" y="20" width="25%" height="25%" fill="rgba(0,0,255,0.1)" stroke="#000" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- RLQ area (This is where bowel sounds are typically auscultated first) -->
  <rect x="65" y="60" width="25%" height="25%" fill="rgba(0,255,0,0.2)" stroke="#090" stroke-width="2"/>
  
  <!-- LLQ area -->
  <rect x="10" y="60" width="25%" height="25%" fill="rgba(0,0,255,0.1)" stroke="#000" stroke-width="1" stroke-dasharray="5,5"/>
  
  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="28" font-weight="bold" fill="#000">Abdominal Quadrants</text>
  
  <!-- Caption -->
  <text x="300" y="570" text-anchor="middle" font-family="Arial" font-size="16" fill="#444">Highlighted area shows Right Lower Quadrant - ideal for initial bowel sound auscultation</text>
</svg>